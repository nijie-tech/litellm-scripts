# ════════════════════════════════════════════════════════════════
# LiteLLM 测试环境 config.yaml
# 这里只放【基础聊天模型】(从 config 启动即加载);embedding 与语义路由器
# 由 setup-smart-router.sh 通过 API 写入 DB(store_model_in_db: true 才允许)。
#
# ⚠️ 下面 4 个 model_name 必须和 scripts/smart-router-routes.json 的 route.name 一致,
#    否则 setup 脚本预检会报"目标模型缺失"。provider/base 按你真实接入填(这里是占位)。
# ════════════════════════════════════════════════════════════════
model_list:
  - model_name: deepseek/deepseek-v4-flash
    litellm_params:
      model: deepseek/deepseek-v4-flash
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: qwen3.7-plus
    litellm_params:
      model: openai/qwen3.7-plus                # openai/ 兼容通道接 DashScope
      api_base: os.environ/DASHSCOPE_BASE
      api_key: os.environ/DASHSCOPE_API_KEY

  - model_name: qwen3.7-max
    litellm_params:
      model: openai/qwen3.7-max
      api_base: os.environ/DASHSCOPE_BASE
      api_key: os.environ/DASHSCOPE_API_KEY

  - model_name: kimi-k2.7-code
    litellm_params:
      model: moonshot/kimi-k2.7-code
      api_key: os.environ/MOONSHOT_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true            # ← 关键:允许 /model/new 把 embedding+router 落库
  # 测试环境:DB 偶发不可用也别整体拒绝(可选)
  allow_requests_on_db_unavailable: false

litellm_settings:
  num_retries: 2
  request_timeout: 60
  drop_params: true                  # 上游不认的参数自动丢,省得 400
  json_logs: true
  # 测试环境不开缓存(无 Redis);要开再加 cache 配置
